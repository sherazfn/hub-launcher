<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Home Hub</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font: 17px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0b0d12; color: #e7ebf0; padding: 24px;
  }
  .card {
    width: 100%; max-width: 420px; background: #151922; border: 1px solid #232a36;
    border-radius: 16px; padding: 28px 24px; text-align: center;
  }
  h1 { margin: 0 0 4px; font-size: 22px; }
  .sub { color: #9aa4b2; margin: 0 0 20px; font-size: 15px; }
  .status {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    min-height: 46px; padding: 10px 14px; border-radius: 10px; margin: 0 0 18px;
    background: #1b2030; border: 1px solid #232a36; font-size: 14px; color: #9aa4b2;
  }
  .status.ok   { background: #10261a; border-color: #1f5235; color: #7ee2a8; }
  .spinner {
    width: 16px; height: 16px; border: 2px solid #3a4456; border-top-color: #7aa2ff;
    border-radius: 50%; animation: spin .8s linear infinite; flex: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  a.btn {
    display: block; text-decoration: none; font-weight: 600; padding: 14px;
    border-radius: 12px; font-size: 17px; margin-top: 10px;
  }
  a.primary   { background: #3b6cff; color: #fff; }
  a.primary:active { background: #2f57d6; }
  a.secondary { background: #222a39; color: #cfd7e3; border: 1px solid #2e3850; }
  a.secondary:active { background: #2b3447; }
  .label { display:block; font-size: 12px; font-weight: 500; opacity: .75; margin-top: 2px; }
  .host { margin: 18px 0 0; color: #6b7484; font-size: 12px; word-break: break-all; }
</style>
</head>
<body>
  <div class="card">
    <h1>Home Hub</h1>
    <p class="sub">Open it whichever way you're connected.</p>

    <div id="status" class="status">
      <span class="spinner"></span>
      <span id="statusText">Checking tailnet&hellip;</span>
    </div>

    <a class="btn primary" href="http://10.0.0.248:5000/">
      At home (Wi-Fi)
      <span class="label">no Tailscale needed</span>
    </a>
    <a class="btn secondary" href="https://pizw.tail336f02.ts.net:8443/">
      Away (Tailscale)
      <span class="label">turn Tailscale on first</span>
    </a>

    <p class="host">LAN 10.0.0.248:5000 · tailnet pizw.tail336f02.ts.net:8443</p>
  </div>

<script>
  // The hub has two front doors:
  //   • Home Wi-Fi → http LAN IP (Tailscale off; everyone in the house)
  //   • Away       → https tailnet name (Tailscale on; trusted cert)
  // This page is served over HTTPS, so it CAN'T probe the http LAN address
  // (mixed content) — but it CAN probe the https tailnet hub. So: if the
  // tailnet is reachable, auto-open it; otherwise just leave both buttons.
  // The "At home" button is shown immediately, so home users tap it without
  // waiting for the probe. The probe is fail-safe: it only auto-opens on a
  // positive response, never redirects on failure.
  var TAILNET = "https://pizw.tail336f02.ts.net:8443/";
  var statusEl = document.getElementById("status");
  var textEl = document.getElementById("statusText");

  var ctrl = new AbortController();
  var timer = setTimeout(function () { ctrl.abort(); }, 4000);

  fetch(TAILNET, { mode: "no-cors", cache: "no-store", signal: ctrl.signal })
    .then(function () {
      clearTimeout(timer);
      statusEl.className = "status ok";
      textEl.textContent = "Tailscale on — opening hub…";
      setTimeout(function () { window.location.replace(TAILNET); }, 700);
    })
    .catch(function () {
      clearTimeout(timer);
      statusEl.innerHTML =
        "On home Wi‑Fi? Tap <b>At home</b>. Away? Turn on Tailscale, then <b>Away</b>.";
    });
</script>
</body>
</html>
